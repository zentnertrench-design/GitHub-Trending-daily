: Daily GitHub Trending

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/daily.yml'

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run pipeline
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE || 'https://api.openai.com/v1' }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'gpt-4o-mini' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/pipeline.py daily

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ data/ index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📝 Daily trending — $(date +%Y-%m-%d)"
            git push
          fi
